<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#F6F7FB" />
  <title>сколько стоят деньги</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <img class="brand-logo" src="./assets/logo.png" alt="" />
        <h1>сколько стоят деньги</h1>
      </div>
      <button id="syncButton" class="icon-button" type="button" aria-label="Обновить">↻</button>
    </header>

    <section id="screen-home" class="screen active">
      <section class="balance-card">
        <div class="balance-topline">
          <span>всего денег</span>
          <small id="status">загрузка...</small>
        </div>
        <strong id="total">0 ₽</strong>
        <div id="accountInline" class="account-inline"></div>
      </section>

      <section class="entry-card">
        <div class="entry-head">
          <h2>новая трата</h2>
          <div class="steps" aria-label="Шаги добавления траты">
            <span class="step active" data-step-dot="1">1</span>
            <span class="step-line"></span>
            <span class="step" data-step-dot="2">2</span>
            <span class="step-line"></span>
            <span class="step" data-step-dot="3">3</span>
          </div>
        </div>

        <form id="expenseForm" class="entry-flow">
          <div class="flow-step active" data-step="1">
            <label class="field-label" for="expenseAmount">сумма</label>
            <div class="money-input-wrap">
              <input id="expenseAmount" class="money-input" inputmode="decimal" autocomplete="off" placeholder="0" />
              <span>₽</span>
            </div>
            <button type="button" class="primary-btn" data-next="expense">далее</button>
          </div>

          <div class="flow-step" data-step="2">
            <label class="field-label">категория</label>
            <div id="expenseCategories" class="chips compact"></div>
            <div class="flow-actions">
              <button type="button" class="secondary-btn" data-back="expense">назад</button>
              <button type="button" class="primary-btn" data-next="expense">далее</button>
            </div>
          </div>

          <div class="flow-step" data-step="3">
            <label class="field-label">откуда списываем</label>
            <div id="expenseAccounts" class="chips compact accounts-chips"></div>
            <label class="field-label" for="expenseDate">дата</label>
            <input id="expenseDate" class="text-input" type="date" />
            <label class="field-label" for="expenseComment">комментарий</label>
            <input id="expenseComment" class="text-input" type="text"  />
            <div class="flow-actions">
              <button type="button" class="secondary-btn" data-back="expense">назад</button>
              <button type="submit" class="primary-btn">зафиксировать</button>
            </div>
          </div>
        </form>
      </section>
    </section>

    <section id="screen-income" class="screen">
      <section class="entry-card income-card">
        <div class="entry-head">
          <h2>новый доход</h2>
          <div class="steps" aria-label="Шаги добавления дохода">
            <span class="income-step active" data-income-step-dot="1">1</span>
            <span class="step-line"></span>
            <span class="income-step" data-income-step-dot="2">2</span>
            <span class="step-line"></span>
            <span class="income-step" data-income-step-dot="3">3</span>
          </div>
        </div>

        <form id="incomeForm" class="entry-flow">
          <div class="income-flow-step active" data-income-step="1">
            <label class="field-label" for="incomeAmount">сумма</label>
            <div class="money-input-wrap">
              <input id="incomeAmount" class="money-input" inputmode="decimal" autocomplete="off" placeholder="0" />
              <span>₽</span>
            </div>
            <button type="button" class="primary-btn" data-next="income">далее</button>
          </div>

          <div class="income-flow-step" data-income-step="2">
            <label class="field-label">категория дохода</label>
            <div id="incomeCategories" class="chips compact"></div>
            <div class="flow-actions">
              <button type="button" class="secondary-btn" data-back="income">назад</button>
              <button type="button" class="primary-btn" data-next="income">далее</button>
            </div>
          </div>

          <div class="income-flow-step" data-income-step="3">
            <label class="field-label">куда зачисляем</label>
            <div id="incomeAccounts" class="chips compact accounts-chips"></div>
            <label class="field-label" for="incomeDate">дата</label>
            <input id="incomeDate" class="text-input" type="date" />
            <label class="field-label" for="incomeComment">комментарий</label>
            <input id="incomeComment" class="text-input" type="text"  />
            <div class="flow-actions">
              <button type="button" class="secondary-btn" data-back="income">назад</button>
              <button type="submit" class="primary-btn">зафиксировать</button>
            </div>
          </div>
        </form>
      </section>
    </section>

    <section id="screen-analytics" class="screen">
      <section class="analytics-card">
        <h2>аналитика</h2>
        <div class="month-switcher">
          <button id="prevMonth" type="button" aria-label="Предыдущий месяц">‹</button>
          <strong id="activeMonthLabel">апрель 2026</strong>
          <button id="nextMonth" type="button" aria-label="Следующий месяц">›</button>
        </div>
        <div class="summary-list summary-main">
          <div><span>доходы</span><strong id="analyticsIncome">0 ₽</strong></div>
          <div><span>расходы</span><strong id="analyticsExpense">0 ₽</strong></div>
          <div><span>остаток</span><strong id="analyticsNet">0 ₽</strong></div>
        </div>
        <div class="analytics-toggle" aria-label="Тип аналитики">
          <button id="analyticsExpenseTab" class="active" type="button" data-analytics-type="expense">расходы</button>
          <button id="analyticsIncomeTab" type="button" data-analytics-type="income">доходы</button>
        </div>
      </section>

      <section class="analytics-card">
        <h2 id="categoryChartTitle">расходы по категориям</h2>
        <div id="analyticsDetailList" class="summary-list detail-list"></div>
        <div class="chart-wrap">
          <canvas id="categoryChart" width="240" height="240"></canvas>
        </div>
        <div id="categoryLegend" class="legend-list"></div>
      </section>
    </section>

    <section id="screen-history" class="screen">
      <section class="analytics-card">
        <h2>история</h2>
        <div id="historyList" class="history-list"></div>
      </section>
    </section>

    <nav class="bottom-nav" aria-label="Навигация">
      <button class="nav-btn active" data-screen="home" type="button">главная</button>
      <button class="nav-btn" data-screen="income" type="button">доходы</button>
      <button class="nav-btn" data-screen="analytics" type="button">аналитика</button>
      <button class="nav-btn" data-screen="history" type="button">история</button>
    </nav>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="./app.js"></script>
</body>
</html>
